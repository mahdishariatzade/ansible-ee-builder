version: 3
images:
  base_image:
    name: quay.io/ansible/awx-ee:latest
dependencies:
  python_interpreter:
    package_system: python3
  ansible_core:
    package_pip: ansible-core
  ansible_runner:
    package_pip: ansible-runner
  system:
    - openssh-clients
    - sshpass
    - libxml2-devel
  galaxy:
    collections:
      - community.docker

additional_build_steps:
  prepend_base:
    - RUN dnf install -y gcc python3-devel libxml2-devel libxslt-devel openssl-devel libffi-devel && dnf clean all
